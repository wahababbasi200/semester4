# Ray Cluster Configuration for AWS
# ----------------------------------
# Launches a GPU cluster on AWS to train all 18 experiments in parallel.
#
# Cost estimate (g4dn.xlarge spot):
#   - ~$0.16/hr per instance (spot price)
#   - 1 head + 2 workers = ~$0.48/hr
#   - Full 18-experiment run: ~1-2 hours = ~$1.00
#
# Usage:
#   ray up ray-cluster.yaml          # Launch cluster
#   ray submit ray-cluster.yaml src/training/train_ray.py  # Run training
#   ray down ray-cluster.yaml        # Tear down when done

cluster_name: fraud-detection-training

# Auto-terminate idle workers after 5 minutes to save money
idle_timeout_minutes: 5

# Max 2 worker nodes (+ 1 head = 3 total GPU instances)
max_workers: 2

# Cloud provider
provider:
    type: aws
    region: us-east-1          # Change to your closest region
    cache_stopped_nodes: False  # Don't keep stopped nodes (saves cost)

# SSH access
auth:
    ssh_user: ubuntu

# Docker: Ray ML image with GPU + CUDA support (has PyTorch pre-installed)
docker:
    image: "rayproject/ray-ml:2.9.3-gpu"
    container_name: "ray_fraud"
    pull_before_run: True
    run_options:
        - --ulimit nofile=65536:65536
        - --shm-size=4g

# ── Node types ──────────────────────────────────────────────────────────────

available_node_types:
    # Head node: also runs experiments
    head:
        resources: {"CPU": 4, "GPU": 1}
        node_config:
            InstanceType: g4dn.xlarge     # 4 vCPU, 16GB RAM, 1x T4 GPU
            BlockDeviceMappings:
                - DeviceName: /dev/sda1
                  Ebs:
                      VolumeSize: 100       # GB disk for data + model artifacts
                      VolumeType: gp3

    # Worker nodes: use spot instances (60-70% cheaper!)
    workers:
        min_workers: 1
        max_workers: 2
        resources: {"CPU": 4, "GPU": 1}
        node_config:
            InstanceType: g4dn.xlarge
            InstanceMarketOptions:
                MarketType: spot
            BlockDeviceMappings:
                - DeviceName: /dev/sda1
                  Ebs:
                      VolumeSize: 100
                      VolumeType: gp3

head_node_type: head

# ── Files to upload to the cluster ──────────────────────────────────────────

file_mounts:
    # Upload your entire project to the cluster
    "/home/ubuntu/fraud-detection-mlops": "."

# ── Setup commands (run once when nodes are created) ────────────────────────

setup_commands:
    # Install your project dependencies (Ray ML image already has torch, etc.)
    - pip install transformers==4.37.2 datasets==2.16.1 gensim==4.3.2
      mlflow==2.10.0 scikit-learn==1.4.0 imbalanced-learn==0.11.0
      fastapi==0.109.2 prometheus-client==0.19.0 pyyaml==6.0.1
      boto3==1.34.34 tokenizers==0.15.1

# ── Ray start commands ──────────────────────────────────────────────────────

head_start_ray_commands:
    - ray stop
    - >-
      ulimit -n 65536;
      ray start --head
      --port=6379
      --object-manager-port=8076
      --dashboard-host=0.0.0.0
      --autoscaling-config=~/ray_bootstrap_config.yaml

worker_start_ray_commands:
    - ray stop
    - >-
      ulimit -n 65536;
      ray start
      --address=$RAY_HEAD_IP:6379
      --object-manager-port=8076
