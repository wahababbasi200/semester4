# Anyscale Job Configuration
# ---------------------------
# Runs all training experiments as a managed Anyscale Job on the hosted cloud.
# Anyscale handles cluster provisioning, scaling, and teardown automatically.
#
# Prerequisites:
#   pip install anyscale
#   anyscale login
#
# Usage:
#   anyscale job submit -f anyscale-job.yaml          # Submit training job
#   anyscale job logs <job-id>                         # View logs
#   anyscale job status <job-id>                       # Check status
#   anyscale job list                                  # List all jobs

name: fraud-detection-training

# Anyscale-hosted cloud (from console — use name, not ID)
cloud: "Anyscale Cloud"

# Entry point: run the Ray-distributed training script
entrypoint: python -m src.training.train_ray --variants distilbert_mlm_ft --seeds 42 123 456

# Upload project files to the cluster
working_dir: "."

# Exclude large/unnecessary files from upload
excludes:
  - data/raw/
  - .git/
  - mlruns/
  - model_artifacts/
  - __pycache__/
  - "*.pyc"
  - venv/

# Pip dependencies to install on the cluster
requirements:
  - transformers==4.37.2
  - datasets==2.16.1
  - gensim==4.3.2
  - mlflow==2.10.0
  - scikit-learn==1.4.0
  - imbalanced-learn==0.11.0
  - fastapi==0.109.2
  - prometheus-client==0.19.0
  - pyyaml==6.0.1
  - boto3==1.34.34
  - tokenizers==0.15.1
  - torch==2.2.0
  - pandas==2.1.4
  - numpy==1.26.4
  - scipy==1.11.4

# Maximum retries on failure
max_retries: 1
