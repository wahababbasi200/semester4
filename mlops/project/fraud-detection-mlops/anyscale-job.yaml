# Anyscale Job Configuration
# ---------------------------
# Runs all training experiments as a managed Anyscale Job on the hosted cloud.
# Anyscale handles cluster provisioning, scaling, and teardown automatically.
#
# Prerequisites:
#   pip install anyscale
#   anyscale login
#
# Usage:
#   anyscale job submit -f anyscale-job.yaml          # Submit training job
#   anyscale job logs <job-id>                         # View logs
#   anyscale job status <job-id>                       # Check status
#   anyscale job list                                  # List all jobs

name: fraud-detection-training-full-v2

# Anyscale-hosted cloud
cloud: "Anyscale Cloud"

# Compute config created in Anyscale console
compute_config: "training-with-gpu:1"

# training script
entrypoint: python -m src.training.train_ray --variants distilbert_ft distilbert_mlm_ft bert_ft --seeds 42 123 456

# Uploading project files to the cluster
working_dir: "."

# Exclude unnecessary files from upload
excludes:
  - data/raw/
  - .git/
  - mlruns/
  - model_artifacts/
  - __pycache__/
  - "*.pyc"
  - venv/
  - venv_wsl/
  - .venv310
  - data/raw/
  - data/processed/eda
  - data/processed/bert_cls_cache
  - data/processed/eda/processing/paysim_filtered.parquet
  - data/processed/eda/processing/receiver_accounts.parquet
  - data/processed/eda/processing/test_accounts.parquet
  - data/processed/eda/processing/train_accounts.parquet
  - data/processed/eda/processing/val_accounts.parquet

# Pip dependencies to install on the cluster
requirements:
  - transformers==4.37.2
  - datasets==2.16.1
  - gensim==4.3.2
  - mlflow==2.10.0
  - scikit-learn==1.4.0
  - imbalanced-learn==0.11.0
  - fastapi==0.109.2
  - prometheus-client==0.19.0
  - pyyaml==6.0.1
  - boto3==1.34.34
  - tokenizers==0.15.1
  - torch==2.2.0
  - pandas==2.1.4
  - numpy==1.26.4
  - scipy==1.11.4

# Maximum retries on failure
max_retries: 1
