# Anyscale Job Configuration
# ---------------------------
# Runs all training experiments as a managed Anyscale Job on the hosted cloud.
# Anyscale handles cluster provisioning, scaling, and teardown automatically.
#
# Prerequisites:
#   pip install anyscale
#   anyscale login
#
# Usage:
#   anyscale job submit -f anyscale-job.yaml          # Submit training job
#   anyscale job logs <job-id>                         # View logs
#   anyscale job status <job-id>                       # Check status
#   anyscale job list                                  # List all jobs

name: fraud-detection-training

# Anyscale-hosted cloud (from console)
cloud: cld_pdl7cpb5dxnluuespnf1rj1h3g

# Entry point: run the Ray-distributed training script
entrypoint: >-
  cd /home/ray/fraud-detection-mlops &&
  python -m src.training.train_ray --variants distilbert_mlm_ft --seeds 42 123 456

# Runtime environment
runtime_env:
  working_dir: "."
  pip:
    - transformers==4.37.2
    - datasets==2.16.1
    - gensim==4.3.2
    - mlflow==2.10.0
    - scikit-learn==1.4.0
    - imbalanced-learn==0.11.0
    - fastapi==0.109.2
    - prometheus-client==0.19.0
    - pyyaml==6.0.1
    - boto3==1.34.34
    - tokenizers==0.15.1
  excludes:
    - "data/raw/"
    - ".git/"
    - "mlruns/"
    - "model_artifacts/"
    - "__pycache__/"
    - "*.pyc"

# Compute configuration
compute_config:
  # Head node (also runs experiments)
  head_node:
    instance_type: "m5.xlarge"         # 4 vCPU, 16GB RAM (no GPU needed for head)

  # Worker nodes with GPU for DistilBERT training
  worker_nodes:
    - instance_type: "g4dn.xlarge"     # 4 vCPU, 16GB RAM, 1x T4 GPU
      min_workers: 1
      max_workers: 2
      use_spot: true                   # 60-70% cheaper with spot instances

# Auto-terminate after idle (saves cost)
idle_timeout_minutes: 10

# Maximum job runtime (safety net)
max_runtime_hours: 4
