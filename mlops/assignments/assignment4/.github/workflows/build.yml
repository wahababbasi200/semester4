# Stage 2 — Build & Package
# Triggers on: push to main (after CI passes)
# Actions: build Docker images, push to GitHub Container Registry (GHCR)

name: Build — Docker Images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_TRAIN: ghcr.io/${{ github.repository_owner }}/fraud-train
  IMAGE_SERVE: ghcr.io/${{ github.repository_owner }}/fraud-serve

jobs:
  build-and-push:
    name: Build + Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (training image)
        id: meta-train
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_TRAIN }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push training image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.train
          push: true
          tags: ${{ steps.meta-train.outputs.tags }}
          labels: ${{ steps.meta-train.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (serve image)
        id: meta-serve
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_SERVE }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push serving image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.serve
          push: true
          tags: ${{ steps.meta-serve.outputs.tags }}
          labels: ${{ steps.meta-serve.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digests
        run: |
          echo "Train image: ${{ env.IMAGE_TRAIN }}:sha-${{ github.sha }}"
          echo "Serve image: ${{ env.IMAGE_SERVE }}:sha-${{ github.sha }}"
