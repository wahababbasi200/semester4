---
# Deployment: fraud-serve FastAPI pod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-serve
  namespace: fraud-a4
  labels:
    app: fraud-serve
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fraud-serve
  template:
    metadata:
      labels:
        app: fraud-serve
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: fraud-serve
          image: ghcr.io/GITHUB_USER/fraud-serve:latest  # replaced by CD workflow
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: /data/models/best_model.pkl
            - name: PREPROCESSOR_PATH
              value: /data/models/preprocessor.pkl
            - name: INFERENCE_THRESHOLD
              value: "0.5"
          volumeMounts:
            - name: fraud-data
              mountPath: /data
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: fraud-data
          persistentVolumeClaim:
            claimName: fraud-a4-pvc

---
# Service: exposes fraud-serve on NodePort 30800
apiVersion: v1
kind: Service
metadata:
  name: fraud-serve-svc
  namespace: fraud-a4
  labels:
    app: fraud-serve
spec:
  type: NodePort
  selector:
    app: fraud-serve
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30800

---
# ServiceMonitor: tells Prometheus (kube-prometheus-stack) to scrape fraud-serve
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: fraud-serve-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus   # must match Helm release name
spec:
  namespaceSelector:
    matchNames:
      - fraud-a4
  selector:
    matchLabels:
      app: fraud-serve
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
