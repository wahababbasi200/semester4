# PIPELINE DEFINITION
# Name: fraud-detection-pipeline
# Description: IEEE CIS Fraud Detection: 7-step MLOps pipeline with conditional deployment and retry mechanisms.
# Inputs:
#    cost_sensitive: bool [Default: False]
#    data_path: str [Default: '/data/processed/sample_ieee_70k.parquet']
#    deploy_auc_threshold: float [Default: 0.85]
#    deploy_path: str [Default: '/data/models']
#    eval_threshold: float [Default: 0.5]
#    imbalance_strategy: str [Default: 'class_weight']
#    model_type: str [Default: 'xgb']
#    model_version: str [Default: 'v1']
#    n_estimators: int [Default: 400.0]
#    random_state: int [Default: 42.0]
components:
  comp-condition-2:
    dag:
      tasks:
        deploy-model:
          cachingOptions: {}
          componentRef:
            name: comp-deploy-model
          inputs:
            artifacts:
              model_artifact:
                componentInputArtifact: pipelinechannel--train-model-model_artifact
              preprocessor_artifact:
                componentInputArtifact: pipelinechannel--preprocess-data-preprocessor_artifact
            parameters:
              deploy_path:
                componentInputParameter: pipelinechannel--deploy_path
              model_version:
                componentInputParameter: pipelinechannel--model_version
          retryPolicy:
            backoffDuration: 30s
            backoffFactor: 2.0
            backoffMaxDuration: 3600s
            maxRetryCount: 2
          taskInfo:
            name: deploy-model
    inputDefinitions:
      artifacts:
        pipelinechannel--preprocess-data-preprocessor_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        pipelinechannel--train-model-model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--deploy_auc_threshold:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--deploy_path:
          parameterType: STRING
        pipelinechannel--evaluate-model-Output:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--model_version:
          parameterType: STRING
  comp-condition-3:
    dag:
      tasks:
        skip-deploy:
          cachingOptions: {}
          componentRef:
            name: comp-skip-deploy
          inputs:
            parameters:
              auc_roc:
                componentInputParameter: pipelinechannel--evaluate-model-Output
              threshold:
                componentInputParameter: pipelinechannel--deploy_auc_threshold
          taskInfo:
            name: skip-deploy
    inputDefinitions:
      parameters:
        pipelinechannel--deploy_auc_threshold:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--evaluate-model-Output:
          parameterType: NUMBER_DOUBLE
  comp-condition-branches-1:
    dag:
      tasks:
        condition-2:
          componentRef:
            name: comp-condition-2
          inputs:
            artifacts:
              pipelinechannel--preprocess-data-preprocessor_artifact:
                componentInputArtifact: pipelinechannel--preprocess-data-preprocessor_artifact
              pipelinechannel--train-model-model_artifact:
                componentInputArtifact: pipelinechannel--train-model-model_artifact
            parameters:
              pipelinechannel--deploy_auc_threshold:
                componentInputParameter: pipelinechannel--deploy_auc_threshold
              pipelinechannel--deploy_path:
                componentInputParameter: pipelinechannel--deploy_path
              pipelinechannel--evaluate-model-Output:
                componentInputParameter: pipelinechannel--evaluate-model-Output
              pipelinechannel--model_version:
                componentInputParameter: pipelinechannel--model_version
          taskInfo:
            name: "AUC above threshold \u2014 deploy"
          triggerPolicy:
            condition: inputs.parameter_values['pipelinechannel--evaluate-model-Output']
              >= inputs.parameter_values['pipelinechannel--deploy_auc_threshold']
        condition-3:
          componentRef:
            name: comp-condition-3
          inputs:
            parameters:
              pipelinechannel--deploy_auc_threshold:
                componentInputParameter: pipelinechannel--deploy_auc_threshold
              pipelinechannel--evaluate-model-Output:
                componentInputParameter: pipelinechannel--evaluate-model-Output
          taskInfo:
            name: "AUC below threshold \u2014 skip deploy"
          triggerPolicy:
            condition: '!(inputs.parameter_values[''pipelinechannel--evaluate-model-Output'']
              >= inputs.parameter_values[''pipelinechannel--deploy_auc_threshold''])'
    inputDefinitions:
      artifacts:
        pipelinechannel--preprocess-data-preprocessor_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        pipelinechannel--train-model-model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
      parameters:
        pipelinechannel--deploy_auc_threshold:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--deploy_path:
          parameterType: STRING
        pipelinechannel--evaluate-model-Output:
          parameterType: NUMBER_DOUBLE
        pipelinechannel--model_version:
          parameterType: STRING
  comp-deploy-model:
    executorLabel: exec-deploy-model
    inputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        preprocessor_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        deploy_path:
          defaultValue: /data/models
          isOptional: true
          parameterType: STRING
        model_version:
          defaultValue: v1
          isOptional: true
          parameterType: STRING
  comp-engineer-features:
    executorLabel: exec-engineer-features
    inputDefinitions:
      artifacts:
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        val_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        test_engineered:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_engineered:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        val_engineered:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-evaluate-model:
    executorLabel: exec-evaluate-model
    inputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        threshold:
          defaultValue: 0.5
          isOptional: true
          parameterType: NUMBER_DOUBLE
    outputDefinitions:
      artifacts:
        eval_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
        plots_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        Output:
          parameterType: NUMBER_DOUBLE
  comp-ingest-data:
    executorLabel: exec-ingest-data
    inputDefinitions:
      parameters:
        data_path:
          parameterType: STRING
    outputDefinitions:
      artifacts:
        output_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-preprocess-data:
    executorLabel: exec-preprocess-data
    inputDefinitions:
      artifacts:
        validated_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
    outputDefinitions:
      artifacts:
        preprocessor_artifact:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        test_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        train_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        val_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
  comp-skip-deploy:
    executorLabel: exec-skip-deploy
    inputDefinitions:
      parameters:
        auc_roc:
          parameterType: NUMBER_DOUBLE
        threshold:
          parameterType: NUMBER_DOUBLE
  comp-train-model:
    executorLabel: exec-train-model
    inputDefinitions:
      artifacts:
        train_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        val_data:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        cost_sensitive:
          defaultValue: false
          isOptional: true
          parameterType: BOOLEAN
        imbalance_strategy:
          defaultValue: class_weight
          isOptional: true
          parameterType: STRING
        model_type:
          defaultValue: xgb
          isOptional: true
          parameterType: STRING
        n_estimators:
          defaultValue: 400.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        random_state:
          defaultValue: 42.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        model_artifact:
          artifactType:
            schemaTitle: system.Model
            schemaVersion: 0.0.1
  comp-validate-data:
    executorLabel: exec-validate-data
    inputDefinitions:
      artifacts:
        input_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
      parameters:
        max_missing_ratio:
          defaultValue: 0.99
          isOptional: true
          parameterType: NUMBER_DOUBLE
        min_rows:
          defaultValue: 1000.0
          isOptional: true
          parameterType: NUMBER_INTEGER
    outputDefinitions:
      artifacts:
        validated_dataset:
          artifactType:
            schemaTitle: system.Dataset
            schemaVersion: 0.0.1
        validation_metrics:
          artifactType:
            schemaTitle: system.Metrics
            schemaVersion: 0.0.1
deploymentSpec:
  executors:
    exec-deploy-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'joblib==1.3.2'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_model(\n    model_artifact: Input[Model],\n    preprocessor_artifact:\
          \ Input[Dataset],\n    deploy_path: str = \"/data/models\",    # PVC-mounted\
          \ serving path\n    model_version: str = \"v1\",\n):\n    \"\"\"\n    Copy\
          \ the trained model and preprocessor to the serving path.\n    In production\
          \ this would trigger a Kubernetes rolling-update;\n    here we write to\
          \ the shared PVC so the FastAPI pod picks it up.\n    \"\"\"\n    import\
          \ shutil\n    import os\n    import json\n\n    os.makedirs(deploy_path,\
          \ exist_ok=True)\n\n    model_src = model_artifact.path\n    prep_src  =\
          \ preprocessor_artifact.path\n\n    model_dst = os.path.join(deploy_path,\
          \ \"best_model.pkl\")\n    prep_dst  = os.path.join(deploy_path, \"preprocessor.pkl\"\
          )\n\n    shutil.copy(model_src, model_dst)\n    shutil.copy(prep_src,  prep_dst)\n\
          \n    # Write version manifest\n    meta = {\n        \"version\":     \
          \     model_version,\n        \"model_type\":       model_artifact.metadata.get(\"\
          model_type\", \"unknown\"),\n        \"imbalance\":        model_artifact.metadata.get(\"\
          imbalance_strategy\", \"unknown\"),\n        \"cost_sensitive\":   model_artifact.metadata.get(\"\
          cost_sensitive\", \"false\"),\n    }\n    with open(os.path.join(deploy_path,\
          \ \"model_meta.json\"), \"w\") as f:\n        json.dump(meta, f, indent=2)\n\
          \n    print(f\"[deploy] Model deployed to {deploy_path}\")\n    print(f\"\
          \  model:        {model_dst}\")\n    print(f\"  preprocessor: {prep_dst}\"\
          )\n    print(f\"  meta:         {meta}\")\n    print(\"[deploy] FastAPI\
          \ service will pick up new model on next request (lazy reload).\")\n\n"
        image: python:3.9
    exec-engineer-features:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - engineer_features
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas==2.1.4'\
          \ 'pyarrow==15.0.2' 'numpy==1.26.4'  &&  python3 -m pip install --quiet\
          \ --no-warn-script-location 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef engineer_features(\n    train_data: Input[Dataset],\n    val_data:\
          \ Input[Dataset],\n    test_data: Input[Dataset],\n    train_engineered:\
          \ Output[Dataset],\n    val_engineered: Output[Dataset],\n    test_engineered:\
          \ Output[Dataset],\n):\n    \"\"\"Add TransactionAmt bins, time features,\
          \ and C-column aggregates.\"\"\"\n    import pandas as pd\n    import numpy\
          \ as np\n\n    FRAUD_COL = \"isFraud\"\n\n    def add_features(df: pd.DataFrame)\
          \ -> pd.DataFrame:\n        d = df.copy()\n        if \"TransactionAmt\"\
          \ in d.columns:\n            d[\"TransactionAmt_log\"]    = np.log1p(d[\"\
          TransactionAmt\"])\n            d[\"TransactionAmt_cents\"]  = (d[\"TransactionAmt\"\
          ] * 100 % 100).astype(int)\n            d[\"TransactionAmt_bin\"]    = pd.cut(\n\
          \                d[\"TransactionAmt\"], bins=[0, 10, 100, 1000, np.inf],\n\
          \                labels=[0, 1, 2, 3], include_lowest=True\n            ).astype(float)\n\
          \n        c_cols = [c for c in d.columns if c[0] == \"C\" and c[1:].isdigit()]\n\
          \        if c_cols:\n            d[\"C_sum\"] = d[c_cols].sum(axis=1)\n\n\
          \        if \"D1\" in d.columns and \"D2\" in d.columns:\n            d[\"\
          D1_D2_ratio\"] = (d[\"D1\"] / (d[\"D2\"].replace(0, np.nan))).fillna(0)\n\
          \n        return d\n\n    for in_art, out_art, name in [\n        (train_data,\
          \ train_engineered, \"train\"),\n        (val_data,   val_engineered,  \
          \ \"val\"),\n        (test_data,  test_engineered,  \"test\"),\n    ]:\n\
          \        src = in_art.path\n        df = pd.read_parquet(src)\n        df_eng\
          \ = add_features(df)\n        out_path = out_art.path\n        df_eng.to_parquet(out_path,\
          \ index=False)\n        out_art.metadata[\"rows\"] = len(df_eng)\n     \
          \   out_art.metadata[\"fraud_rate\"] = df_eng[FRAUD_COL].mean() if FRAUD_COL\
          \ in df_eng.columns else 0.0\n        print(f\"[feateng] {name}: {df.shape[1]}\
          \ \u2192 {df_eng.shape[1]} features\")\n\n"
        image: python:3.9
    exec-evaluate-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas==2.1.4'\
          \ 'pyarrow==15.0.2' 'numpy==1.26.4' 'scikit-learn==1.3.2' 'xgboost==2.0.3'\
          \ 'lightgbm==4.3.0' 'joblib==1.3.2' 'matplotlib==3.8.2'  &&  python3 -m\
          \ pip install --quiet --no-warn-script-location 'kfp==2.16.0' '--no-deps'\
          \ 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"$0\" \"$@\"\
          \n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate_model(\n    test_data: Input[Dataset],\n    model_artifact:\
          \ Input[Model],\n    eval_metrics: Output[Metrics],\n    plots_artifact:\
          \ Output[Dataset],   # stores confusion matrix + PR curve PNGs\n    threshold:\
          \ float = 0.5,\n) -> float:   # returns AUC-ROC so pipeline can branch on\
          \ it\n    \"\"\"Evaluate trained model: Precision/Recall/F1/AUC-ROC/Confusion\
          \ Matrix.\"\"\"\n    import pandas as pd\n    import numpy as np\n    import\
          \ joblib\n    import matplotlib.pyplot as plt\n    import os\n    from sklearn.metrics\
          \ import (\n        classification_report, roc_auc_score,\n        confusion_matrix,\
          \ ConfusionMatrixDisplay,\n        average_precision_score, precision_recall_curve,\n\
          \    )\n\n    FRAUD_COL = \"isFraud\"\n\n    src = test_data.path\n    df\
          \ = pd.read_parquet(src)\n    X_test = df.drop(columns=[FRAUD_COL]).values.astype(np.float32)\n\
          \    y_test = df[FRAUD_COL].values\n\n    model_path = model_artifact.path\n\
          \    payload = joblib.load(model_path)\n\n    # Handle RF-FS hybrid (dict\
          \ with selector + model)\n    if isinstance(payload, dict) and \"selector\"\
          \ in payload:\n        X_test = payload[\"selector\"].transform(X_test)\n\
          \        model = payload[\"model\"]\n    else:\n        model = payload\n\
          \n    proba = model.predict_proba(X_test)[:, 1]\n    y_pred = (proba >=\
          \ threshold).astype(int)\n\n    report = classification_report(y_test, y_pred,\
          \ output_dict=True)\n    auc_roc  = float(roc_auc_score(y_test, proba))\n\
          \    pr_auc   = float(average_precision_score(y_test, proba))\n    precision\
          \ = float(report[\"1\"][\"precision\"])\n    recall    = float(report[\"\
          1\"][\"recall\"])\n    f1        = float(report[\"1\"][\"f1-score\"])\n\
          \    fpr = float((y_pred[y_test == 0] == 1).sum() / max((y_test == 0).sum(),\
          \ 1))\n\n    eval_metrics.log_metric(\"auc_roc\",   round(auc_roc, 4))\n\
          \    eval_metrics.log_metric(\"pr_auc\",    round(pr_auc, 4))\n    eval_metrics.log_metric(\"\
          precision\", round(precision, 4))\n    eval_metrics.log_metric(\"recall\"\
          ,    round(recall, 4))\n    eval_metrics.log_metric(\"f1_score\",  round(f1,\
          \ 4))\n    eval_metrics.log_metric(\"false_positive_rate\", round(fpr, 4))\n\
          \    eval_metrics.log_metric(\"threshold\", threshold)\n\n    print(f\"\
          [eval] AUC-ROC={auc_roc:.4f}  Recall={recall:.4f}  Precision={precision:.4f}\
          \  \"\n          f\"F1={f1:.4f}  PR-AUC={pr_auc:.4f}\")\n\n    # Save plots\n\
          \    plots_dir = plots_artifact.path\n    os.makedirs(plots_dir, exist_ok=True)\n\
          \n    # Confusion matrix\n    cm = confusion_matrix(y_test, y_pred)\n  \
          \  fig, ax = plt.subplots(figsize=(5, 4))\n    ConfusionMatrixDisplay(cm,\
          \ display_labels=[\"Legit\", \"Fraud\"]).plot(ax=ax, colorbar=False)\n \
          \   model_name = model_artifact.metadata.get(\"model_type\", \"model\")\n\
          \    ax.set_title(f\"{model_name.upper()} Confusion Matrix\")\n    plt.tight_layout()\n\
          \    plt.savefig(os.path.join(plots_dir, \"confusion_matrix.png\"), dpi=150)\n\
          \    plt.close()\n\n    # PR curve\n    prec_vals, rec_vals, _ = precision_recall_curve(y_test,\
          \ proba)\n    plt.figure(figsize=(6, 4))\n    plt.plot(rec_vals, prec_vals,\
          \ label=f\"PR-AUC={pr_auc:.3f}\", color=\"steelblue\")\n    plt.xlabel(\"\
          Recall\"); plt.ylabel(\"Precision\")\n    plt.title(f\"{model_name.upper()}\
          \ Precision-Recall Curve\")\n    plt.legend(); plt.grid(alpha=0.3); plt.tight_layout()\n\
          \    plt.savefig(os.path.join(plots_dir, \"pr_curve.png\"), dpi=150)\n \
          \   plt.close()\n\n    plots_artifact.metadata[\"auc_roc\"] = auc_roc  \
          \ # used by downstream deploy condition\n    return auc_roc\n\n"
        image: python:3.9
    exec-ingest-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - ingest_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'pandas==2.1.4'\
          \ 'pyarrow==15.0.2' 'numpy==1.26.4'  &&  python3 -m pip install --quiet\
          \ --no-warn-script-location 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5;\
          \ python_version<\"3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef ingest_data(\n    data_path: str,          # path inside pod\
          \ (PVC mount), e.g. /data/sample_ieee_70k.parquet\n    output_dataset: Output[Dataset],\n\
          ):\n    \"\"\"Read IEEE CIS sample from PVC-mounted path and pass as KFP\
          \ artifact.\"\"\"\n    import pandas as pd\n    import os\n\n    print(f\"\
          [ingest] Reading from {data_path}\")\n    if not os.path.exists(data_path):\n\
          \        raise FileNotFoundError(\n            f\"Sample not found at {data_path}.\
          \ \"\n            \"Ensure the PVC is mounted and build_sample.py was run\
          \ first.\"\n        )\n\n    df = pd.read_parquet(data_path)\n    print(f\"\
          [ingest] Shape: {df.shape}  |  fraud rate: {df['isFraud'].mean():.2%}\"\
          )\n\n    # Write directly to the managed artifact path so downstream tasks\
          \ can resolve it.\n    df.to_parquet(output_dataset.path, index=False)\n\
          \    output_dataset.metadata[\"rows\"] = len(df)\n    output_dataset.metadata[\"\
          fraud_rate\"] = round(float(df[\"isFraud\"].mean()), 4)\n\n    print(f\"\
          [ingest] Written to artifact: {output_dataset.path}\")\n\n"
        image: python:3.9
    exec-preprocess-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - preprocess_data
        command:
        - sh
        - -c
