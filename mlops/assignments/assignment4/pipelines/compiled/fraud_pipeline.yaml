          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef validate_data(\n    input_dataset: Input[Dataset],\n    validated_dataset:\
          \ Output[Dataset],\n    validation_metrics: Output[Metrics],\n    min_rows:\
          \ int = 1000,\n    max_missing_ratio: float = 0.99,\n):\n    \"\"\"Validate\
          \ schema, row count, and missing values. Fail fast on errors.\"\"\"\n  \
          \  import pandas as pd\n    import shutil\n\n    src = input_dataset.path\n\
          \    print(f\"[validate] Reading from {src}\")\n    df = pd.read_parquet(src)\n\
          \n    errors = []\n    REQUIRED = [\"isFraud\", \"TransactionDT\", \"TransactionAmt\"\
          , \"ProductCD\"]\n    missing_cols = [c for c in REQUIRED if c not in df.columns]\n\
          \    if missing_cols:\n        errors.append(f\"Missing required columns:\
          \ {missing_cols}\")\n\n    if len(df) < min_rows:\n        errors.append(f\"\
          Too few rows: {len(df)} < {min_rows}\")\n\n    high_null = df.columns[df.isnull().mean()\
          \ > max_missing_ratio].tolist()\n    if high_null:\n        errors.append(f\"\
          Columns >{max_missing_ratio:.0%} null: {high_null[:5]}\")\n\n    fraud_rate\
          \ = float(df[\"isFraud\"].mean())\n    overall_missing = float(df.isnull().mean().mean())\n\
          \n    validation_metrics.log_metric(\"rows\", len(df))\n    validation_metrics.log_metric(\"\
          columns\", df.shape[1])\n    validation_metrics.log_metric(\"fraud_rate\"\
          , round(fraud_rate, 4))\n    validation_metrics.log_metric(\"avg_missing_rate\"\
          , round(overall_missing, 4))\n    validation_metrics.log_metric(\"validation_passed\"\
          , 1 if not errors else 0)\n\n    if errors:\n        raise ValueError(\"\
          Validation FAILED:\\n\" + \"\\n\".join(errors))\n\n    print(f\"[validate]\
          \ PASSED \u2014 rows={len(df):,} fraud={fraud_rate:.2%} missing={overall_missing:.2%}\"\
          )\n\n    # Pass through to next component\n    out_path = validated_dataset.path\n\
          \    shutil.copy(src, out_path)\n    validated_dataset.metadata[\"rows\"\
          ] = len(df)\n\n"
