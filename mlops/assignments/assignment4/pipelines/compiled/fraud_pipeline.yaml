        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef preprocess_data(\n    validated_dataset: Input[Dataset],\n  \
          \  train_data: Output[Dataset],\n    val_data: Output[Dataset],\n    test_data:\
          \ Output[Dataset],\n    preprocessor_artifact: Output[Dataset],   # saves\
          \ encoders + medians\n):\n    \"\"\"\n    Full preprocessing:\n      - Missing\
          \ indicators for >30% null numeric columns\n      - M-columns: T\u21921,\
          \ F\u21920, NaN\u2192-1\n      - Target encoding (smoothed) for high-cardinality\
          \ cols\n      - Label encoding for remaining strings\n      - Median imputation\
          \ for remaining numerics\n      - Chronological 70/15/15 split\n    \"\"\
          \"\n    import pandas as pd\n    import numpy as np\n    from sklearn.preprocessing\
          \ import LabelEncoder\n    import joblib\n\n    M_COLS = [f\"M{i}\" for\
          \ i in range(1, 10)]\n    HIGH_CARD = [\"card1\", \"card2\", \"card5\",\
          \ \"addr1\", \"P_emaildomain\",\n                 \"R_emaildomain\", \"\
          DeviceInfo\"]\n    FRAUD_COL = \"isFraud\"\n    DROP_COLS = [\"TransactionID\"\
          , \"TransactionDT\"]\n    MISSING_THRESH = 0.30\n\n    src = validated_dataset.path\n\
          \    df = pd.read_parquet(src)\n    df = df.sort_values(\"TransactionDT\"\
          ).reset_index(drop=True)\n\n    # Chronological split first (prevent leakage)\n\
          \    n = len(df)\n    val_start  = int(n * 0.70)\n    test_start = int(n\
          \ * 0.85)\n    train_raw = df.iloc[:val_start]\n    val_raw   = df.iloc[val_start:test_start]\n\
          \    test_raw  = df.iloc[test_start:]\n\n    def target_encode(train_df,\
          \ cols, target, smoothing=20.0):\n        global_mean = train_df[target].mean()\n\
          \        enc = {}\n        for col in cols:\n            if col not in train_df.columns:\n\
          \                continue\n            stats = train_df.groupby(col)[target].agg([\"\
          mean\", \"count\"])\n            smoothed = (stats[\"count\"] * stats[\"\
          mean\"] + smoothing * global_mean) / \\\n                       (stats[\"\
          count\"] + smoothing)\n            enc[col] = smoothed.to_dict()\n     \
          \   return enc\n\n    def apply_transforms(data, encoders, medians, fit=False,\
          \ train_for_enc=None):\n        d = data.copy()\n        drop = [c for c\
          \ in DROP_COLS if c in d.columns]\n        d = d.drop(columns=drop)\n  \
          \      y = d.pop(FRAUD_COL) if FRAUD_COL in d.columns else None\n\n    \
          \    # Missing indicators\n        miss_rates = d.isnull().mean()\n    \
          \    for col in miss_rates[miss_rates > MISSING_THRESH].index:\n       \
          \     if pd.api.types.is_numeric_dtype(d[col]):\n                d[f\"{col}_missing\"\
          ] = d[col].isnull().astype(np.int8)\n\n        # M-columns\n        for\
          \ col in M_COLS:\n            if col in d.columns:\n                d[col]\
          \ = d[col].map({\"T\": 1, \"F\": 0}).fillna(-1).astype(np.int8)\n\n    \
          \    # Target encoding\n        gm = y.mean() if y is not None else 0.05\n\
          \        for col, mapping in encoders.items():\n            if col in d.columns:\n\
          \                d[col] = d[col].map(mapping).fillna(gm)\n\n        # Label\
          \ encode remaining strings\n        for col in d.select_dtypes(include=[\"\
          object\", \"str\", \"category\"]).columns:\n            le = LabelEncoder()\n\
          \            d[col] = le.fit_transform(d[col].astype(str))\n\n        #\
          \ Median imputation\n        for col, val in medians.items():\n        \
          \    if col in d.columns:\n                d[col] = d[col].fillna(val)\n\
          \        d = d.fillna(0)\n        return d, y\n\n    # Fit encoders on training\
          \ set\n    encoders = target_encode(train_raw, HIGH_CARD, FRAUD_COL)\n \
          \   # Compute medians after dropping non-feature cols\n    tmp = train_raw.drop(columns=[c\
          \ for c in DROP_COLS if c in train_raw.columns])\n    tmp = tmp.drop(columns=[FRAUD_COL],\
          \ errors=\"ignore\")\n    for col in M_COLS:\n        if col in tmp.columns:\n\
          \            tmp[col] = tmp[col].map({\"T\": 1, \"F\": 0}).fillna(-1)\n\
          \    gm = train_raw[FRAUD_COL].mean()\n    for col, mapping in encoders.items():\n\
          \        if col in tmp.columns:\n            tmp[col] = tmp[col].map(mapping).fillna(gm)\n\
          \    medians = tmp.select_dtypes(include=[np.number]).median().to_dict()\n\
          \n    X_train, y_train = apply_transforms(train_raw, encoders, medians)\n\
          \    X_val,   y_val   = apply_transforms(val_raw,   encoders, medians)\n\
          \    X_test,  y_test  = apply_transforms(test_raw,  encoders, medians)\n\
          \n    # Save splits\n    for split_name, X, y, out_art in [\n        (\"\
          train\", X_train, y_train, train_data),\n        (\"val\",   X_val,   y_val,\
          \   val_data),\n        (\"test\",  X_test,  y_test,  test_data),\n    ]:\n\
          \        out = X.copy(); out[FRAUD_COL] = y.values\n        path = out_art.path\n\
          \        out.to_parquet(path, index=False)\n        out_art.metadata[\"\
          rows\"] = len(out)\n        out_art.metadata[\"fraud_rate\"] = round(float(y.mean()),\
          \ 4)\n        print(f\"[preprocess] {split_name}: {len(out):,} rows  fraud={y.mean():.2%}\
          \  features={X.shape[1]}\")\n\n    # Save preprocessor\n    prep_path =\
          \ preprocessor_artifact.path\n    joblib.dump({\"encoders\": encoders, \"\
          medians\": medians}, prep_path)\n    print(f\"[preprocess] Preprocessor\
          \ saved \u2192 {prep_path}\")\n\n"
