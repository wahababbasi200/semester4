          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef train_model(\n    train_data: Input[Dataset],\n    val_data:\
          \ Input[Dataset],\n    model_artifact: Output[Model],\n    model_type: str\
          \ = \"xgb\",               # \"xgb\" | \"lgbm\" | \"rf_fs\"\n    imbalance_strategy:\
          \ str = \"class_weight\",  # \"class_weight\" | \"smote\"\n    cost_sensitive:\
          \ bool = False,\n    n_estimators: int = 400,\n    random_state: int = 42,\n\
          ):\n    \"\"\"Train fraud detection model with configurable type and imbalance\
          \ strategy.\"\"\"\n    import pandas as pd\n    import numpy as np\n   \
          \ import joblib\n\n    FRAUD_COL = \"isFraud\"\n\n    def load_split(art):\n\
          \        src = art.path\n        d = pd.read_parquet(src)\n        X = d.drop(columns=[FRAUD_COL])\n\
          \        y = d[FRAUD_COL]\n        return X.values.astype(np.float32), y.values.astype(np.int32)\n\
          \n    X_train, y_train = load_split(train_data)\n    X_val,   y_val   =\
          \ load_split(val_data)\n    neg, pos = (y_train == 0).sum(), (y_train ==\
          \ 1).sum()\n    spw = neg / pos\n    print(f\"[train] model={model_type}\
          \  imbalance={imbalance_strategy}  \"\n          f\"cost_sensitive={cost_sensitive}\
          \  neg={neg}  pos={pos}  spw={spw:.2f}\")\n\n    # Apply SMOTE before training\
          \ if requested\n    if imbalance_strategy == \"smote\":\n        from imblearn.over_sampling\
          \ import SMOTE\n        sm = SMOTE(random_state=random_state, k_neighbors=5)\n\
          \        X_train, y_train = sm.fit_resample(X_train, y_train)\n        print(f\"\
          [train] After SMOTE: {len(X_train):,} samples\")\n        effective_spw\
          \ = 1.0   # SMOTE already balanced\n    else:\n        effective_spw = spw\n\
          \n    if cost_sensitive:\n        effective_spw = max(effective_spw, 10.0)\n\
          \n    # \u2500\u2500 XGBoost \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\n    if model_type == \"xgb\":\n        import\
          \ xgboost as xgb\n        model = xgb.XGBClassifier(\n            n_estimators=n_estimators,\
          \ max_depth=6, learning_rate=0.05,\n            scale_pos_weight=effective_spw,\
          \ tree_method=\"hist\",\n            eval_metric=\"logloss\", random_state=random_state,\
          \ n_jobs=-1\n        )\n        model.fit(X_train, y_train,\n          \
          \        eval_set=[(X_val, y_val)], verbose=100)\n        payload = model\n\
          \n    # \u2500\u2500 LightGBM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\n    elif model_type == \"lgbm\":\n\
          \        import lightgbm as lgb\n        model = lgb.LGBMClassifier(\n \
          \           n_estimators=n_estimators, num_leaves=64, learning_rate=0.05,\n\
          \            is_unbalance=(imbalance_strategy == \"class_weight\"),\n  \
          \          objective=\"binary\", metric=\"auc\",\n            random_state=random_state,\
          \ n_jobs=-1, verbose=-1\n        )\n        cbs = [lgb.early_stopping(50,\
          \ verbose=False), lgb.log_evaluation(100)]\n        model.fit(X_train, y_train,\
          \ eval_set=[(X_val, y_val)], callbacks=cbs)\n        payload = model\n\n\
          \    # \u2500\u2500 Random Forest + Feature Selection (Hybrid) \u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
          \u2500\n    elif model_type == \"rf_fs\":\n        from sklearn.ensemble\
          \ import RandomForestClassifier\n        from sklearn.feature_selection\
          \ import SelectFromModel\n        cw = {0: 1, 1: int(max(neg / pos, 5))}\n\
          \        rf_full = RandomForestClassifier(\n            n_estimators=100,\
          \ class_weight=cw,\n            random_state=random_state, n_jobs=-1, max_depth=10\n\
          \        )\n        rf_full.fit(X_train, y_train)\n        selector = SelectFromModel(rf_full,\
          \ threshold=\"median\", prefit=True)\n        X_tr_sel = selector.transform(X_train)\n\
          \        selector.transform(X_val)\n        print(f\"[train] RF-FS selected\
          \ {X_tr_sel.shape[1]}/{X_train.shape[1]} features\")\n\n        rf_final\
          \ = RandomForestClassifier(\n            n_estimators=n_estimators, class_weight=cw,\n\
          \            random_state=random_state, n_jobs=-1, max_depth=12\n      \
          \  )\n        rf_final.fit(X_tr_sel, y_train)\n        payload = {\"selector\"\
          : selector, \"model\": rf_final}\n    else:\n        raise ValueError(f\"\
          Unknown model_type: {model_type}\")\n\n    model_path = model_artifact.path\n\
          \    joblib.dump(payload, model_path)\n    model_artifact.metadata[\"model_type\"\
