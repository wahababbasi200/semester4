pipelineInfo:
  description: 'IEEE CIS Fraud Detection: 7-step MLOps pipeline with conditional deployment
    and retry mechanisms.'
  name: fraud-detection-pipeline
root:
  dag:
    tasks:
      condition-branches-1:
        componentRef:
          name: comp-condition-branches-1
        dependentTasks:
        - evaluate-model
        - preprocess-data
        - train-model
        inputs:
          artifacts:
            pipelinechannel--preprocess-data-preprocessor_artifact:
              taskOutputArtifact:
                outputArtifactKey: preprocessor_artifact
                producerTask: preprocess-data
            pipelinechannel--train-model-model_artifact:
              taskOutputArtifact:
                outputArtifactKey: model_artifact
                producerTask: train-model
          parameters:
            pipelinechannel--deploy_auc_threshold:
              componentInputParameter: deploy_auc_threshold
            pipelinechannel--deploy_path:
              componentInputParameter: deploy_path
            pipelinechannel--evaluate-model-Output:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: evaluate-model
            pipelinechannel--model_version:
              componentInputParameter: model_version
        taskInfo:
          name: condition-branches-1
      engineer-features:
        cachingOptions: {}
        componentRef:
          name: comp-engineer-features
        dependentTasks:
        - preprocess-data
        inputs:
          artifacts:
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_data
                producerTask: preprocess-data
            train_data:
              taskOutputArtifact:
                outputArtifactKey: train_data
                producerTask: preprocess-data
            val_data:
              taskOutputArtifact:
                outputArtifactKey: val_data
                producerTask: preprocess-data
        taskInfo:
          name: engineer-features
      evaluate-model:
        cachingOptions: {}
        componentRef:
          name: comp-evaluate-model
        dependentTasks:
        - engineer-features
        - train-model
        inputs:
          artifacts:
            model_artifact:
              taskOutputArtifact:
                outputArtifactKey: model_artifact
                producerTask: train-model
            test_data:
              taskOutputArtifact:
                outputArtifactKey: test_engineered
                producerTask: engineer-features
          parameters:
            threshold:
              componentInputParameter: eval_threshold
        retryPolicy:
          backoffDuration: 30s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 1
        taskInfo:
          name: evaluate-model
      ingest-data:
        cachingOptions: {}
        componentRef:
          name: comp-ingest-data
        inputs:
          parameters:
            data_path:
              componentInputParameter: data_path
        taskInfo:
          name: ingest-data
      preprocess-data:
        cachingOptions: {}
        componentRef:
          name: comp-preprocess-data
        dependentTasks:
        - validate-data
        inputs:
          artifacts:
            validated_dataset:
              taskOutputArtifact:
                outputArtifactKey: validated_dataset
                producerTask: validate-data
        taskInfo:
          name: preprocess-data
      train-model:
        cachingOptions: {}
        componentRef:
          name: comp-train-model
        dependentTasks:
        - engineer-features
        inputs:
          artifacts:
            train_data:
              taskOutputArtifact:
                outputArtifactKey: train_engineered
                producerTask: engineer-features
            val_data:
              taskOutputArtifact:
                outputArtifactKey: val_engineered
                producerTask: engineer-features
          parameters:
            cost_sensitive:
              componentInputParameter: cost_sensitive
            imbalance_strategy:
              componentInputParameter: imbalance_strategy
            model_type:
              componentInputParameter: model_type
            n_estimators:
              componentInputParameter: n_estimators
            random_state:
              componentInputParameter: random_state
        retryPolicy:
          backoffDuration: 60s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: train-model
      validate-data:
        cachingOptions: {}
        componentRef:
