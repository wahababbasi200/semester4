          \ python3 -m pip install --quiet --no-warn-script-location 'pandas==2.1.4'\
          \ 'pyarrow==15.0.2' 'numpy==1.26.4' 'scikit-learn==1.3.2' 'category_encoders==2.6.3'\
          \ 'joblib==1.3.2'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
