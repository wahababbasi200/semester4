# Assignment 4 CI — Lint, Test, Validate
# Triggers on push to any branch or PR to main

name: A4 CI — Lint, Test, Validate

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: mlops/assignments/assignment4

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: mlops/assignments/assignment4/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest pandas==2.1.4 numpy==1.26.4 \
            scikit-learn==1.3.2 pyarrow==15.0.2 \
            xgboost==2.0.3 lightgbm==4.3.0 \
            imbalanced-learn==0.12.2 category_encoders==2.6.3 \
            joblib==1.3.2

      - name: Lint with ruff
        run: ruff check src/ pipelines/ scripts/ tests/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  data-validation:
    name: Data Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip

      - name: Install dependencies
        run: pip install pandas==2.1.4 pyarrow==15.0.2 numpy==1.26.4
        working-directory: .

      - name: Validate data schema (skips if data not committed)
        run: |
          if [ -f "data/processed/sample_ieee_70k.parquet" ]; then
            python src/data/validate.py data/processed/sample_ieee_70k.parquet
          else
            echo "Sample data not committed — schema check skipped"
          fi
